name: "📊 Prediction Submission"
description: "Submit your predictions CSV for evaluation"
title: "[SUBMISSION] Team Name - Run Number"
labels: ["submission", "pending"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🎭 Image Emotion Recognition — Prediction Submission
        Fill in all fields and attach your CSV file. Your score will appear here and on the leaderboard within ~5 minutes.

  - type: input
    id: team_name
    attributes:
      label: "👤 Team / Participant Name"
      placeholder: "e.g., Team Dakar"
    validations:
      required: true

  - type: input
    id: model_name
    attributes:
      label: "🏷️ Model / Run Name"
      placeholder: "e.g., ResNet50-augmented-v2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "📄 Approach Description"
      description: "Brief description of your model and strategy."
      placeholder: "Fine-tuned ResNet50 with mixup augmentation, trained for 20 epochs..."
    validations:
      required: false

  - type: input
    id: submission_number
    attributes:
      label: "🔢 Submission Number (today)"
      description: "Maximum 3 submissions per day."
      placeholder: "1"
    validations:
      required: true

  - type: textarea
    id: csv_content
    attributes:
      label: "📎 CSV Predictions"
      description: |
        Paste the full content of your submission CSV here.
        First row must be the header: `image_id,label`
        Each subsequent row: `img_XXXX,N` where N is 0-6.
      placeholder: |
        image_id,label
        img_0001,3
        img_0002,0
        img_0003,5
      render: text
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: "✅ Pre-submission Checklist"
      options:
        - label: "My CSV has exactly two columns: `image_id` and `label`"
          required: true
        - label: "All labels are integers between 0 and 6"
          required: true
        - label: "My CSV contains predictions for all test images"
          required: true
        - label: "This is submission number ≤ 3 for today"
          required: true
