name: 🤖 Auto-Evaluate Submission

on:
  issues:
    types: [opened]

jobs:

  check-submission:
    runs-on: ubuntu-latest
    outputs:
      is_submission: ${{ steps.check.outputs.is_submission }}
    steps:
      - name: Check if issue is a submission
        id: check
        run: |
          LABELS='${{ toJson(github.event.issue.labels.*.name) }}'
          if echo "$LABELS" | grep -q "submission"; then
            echo "is_submission=true" >> $GITHUB_OUTPUT
          else
            echo "is_submission=false" >> $GITHUB_OUTPUT
          fi

  evaluate:
    needs: check-submission
    if: needs.check-submission.outputs.is_submission == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install dependencies
        run: pip install pandas scikit-learn

      - name: 📋 Parse issue and extract CSV
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          python submission_handler/process_submission.py \
            --issue-number "$ISSUE_NUMBER" \
            --issue-title "$ISSUE_TITLE"

      - name: 🔐 Restore secret labels
        env:
          SECRET_LABELS_CSV: ${{ secrets.SECRET_LABELS_CSV }}
        run: |
          echo "$SECRET_LABELS_CSV" > /tmp/secret_labels.csv

      - name: 🧪 Run evaluation
        run: |
          python evaluator/evaluate.py \
            --submission /tmp/submission.csv \
            --ground-truth /tmp/secret_labels.csv \
            --metadata /tmp/metadata.json \
            --output /tmp/results.json

      - name: 💾 Update leaderboard JSON
        run: |
          python submission_handler/update_leaderboard.py \
            --results /tmp/results.json

      - name: 📤 Commit leaderboard update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard/results.json
          git diff --cached --quiet || git commit -m "📊 Leaderboard update — Issue #${{ github.event.issue.number }}"
          git push

      - name: 💬 Post results as comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('/tmp/results.json', 'utf8'));

            const medal = results.rank === 1 ? '🥇' : results.rank === 2 ? '🥈' : results.rank === 3 ? '🥉' : '🎯';

            const body = `## ✅ Evaluation Complete — #${{ github.event.issue.number }}

            | Metric | Score |
            |--------|-------|
            | **Accuracy** | \`${(results.accuracy * 100).toFixed(2)}%\` |
            | **Correct predictions** | \`${results.correct} / ${results.total}\` |
            | **Current Rank** | ${medal} \`#${results.rank}\` |

            ### Per-class Accuracy
            | Emotion | Correct | Total | Accuracy |
            |---------|---------|-------|----------|
            | 😠 Angry    | ${results.per_class.angry.correct} | ${results.per_class.angry.total} | ${(results.per_class.angry.acc * 100).toFixed(1)}% |
            | 🤢 Disgust  | ${results.per_class.disgust.correct} | ${results.per_class.disgust.total} | ${(results.per_class.disgust.acc * 100).toFixed(1)}% |
            | 😨 Fear     | ${results.per_class.fear.correct} | ${results.per_class.fear.total} | ${(results.per_class.fear.acc * 100).toFixed(1)}% |
            | 😄 Happy    | ${results.per_class.happy.correct} | ${results.per_class.happy.total} | ${(results.per_class.happy.acc * 100).toFixed(1)}% |
            | 😐 Neutral  | ${results.per_class.neutral.correct} | ${results.per_class.neutral.total} | ${(results.per_class.neutral.acc * 100).toFixed(1)}% |
            | 😢 Sad      | ${results.per_class.sad.correct} | ${results.per_class.sad.total} | ${(results.per_class.sad.acc * 100).toFixed(1)}% |
            | 😲 Surprise | ${results.per_class.surprise.correct} | ${results.per_class.surprise.total} | ${(results.per_class.surprise.acc * 100).toFixed(1)}% |

            🔗 [View full leaderboard](https://your-streamlit-app.streamlit.app)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: ✅ Mark as evaluated
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'pending'
              });
            } catch(e) {}
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['evaluated']
            });

      - name: ❌ Handle failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ Evaluation Failed

              An error occurred while evaluating your submission. Common causes:
              - ❌ CSV format is incorrect (must have columns \`image_id\` and \`label\`)
              - ❌ Missing predictions for some test images
              - ❌ Labels outside the range 0–6
              - ❌ CSV content was not pasted in the correct field

              Please fix your submission and resubmit.`
            });
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['error']
            });
